<!DOCTYPE html>
<html>
  <head>
    <title>Flex Practice</title>
     </head>
    <body style="padding-bottom:1000px;">
<div style="
  display:flex;
  flex-direction:row;
  ">
 
  <div style="background-color:lightblue; 
  width:100px;
  ">div1</div>
  
  <div style="background-color:lightpink;
  flex:1;">div2</div>

 <div style="background-color:lightskyblue;
   flex:2;
   ">div3</div>
   
  </div>

  <div style="
  display:flex;
  flex-direction:row;
  margin-top:30px;
  height:70px;
  border-style:solid;
  border-color:gray;
  border-width:1px;
  justify-content:center;
  ">
 
  <div style="background-color:lightblue; 
  width:100px;
  ">div1</div>
  
  <div style="background-color:lightpink;
  width:100px;">div2</div>

 <div style="background-color:lightskyblue;
   width:100px;
   ">div3</div>
  </div>

  <div style="
  display:flex;
  flex-direction:row;
  margin-top:30px;
  height:70px;
  border-style:solid;
  border-color:gray;
  border-width:1px;
  justify-content:space-between;
  align-items:center;
  ">
 
  <div style="background-color:lightblue; 
  width:100px;
  ">div1</div>
  
  <div style="background-color:lightpink;

 <div style="background-color:lightskyblue;
   width:100px;
   ">div3</div>

</html>
