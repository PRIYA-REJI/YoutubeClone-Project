<!DOCTYPE html>
<html>
  <head>
    <title>YouTube.com Clone</title>
    <style>
      .thumbnails{
        width:300px;
        
      }
      .search-bar{
         display:block;
        }
        .video-title{
          margin-top:0;
          
        }
        
        .video-preview{
          width:300px;
          display:inline-block;
          vertical-align:top;
          margin-right:15px;
        }
      
        .channel-pictures{
          display:inline-block;
          width:50px;
          vertical-align:top;
        }
        .video-info{
          display:inline-block;
          width:200px;
        }
        .profile-picture{
          width:50px;
        }
    </style>
  </head>
  <body>
    <input class="search-bar" type="text" 
     placeholder="Search">

    <div class="video-preview">
    <div>
      <img class="thumbnails"
     src="thumbnails/thumbnail-1.webp">
    </div>

    <div>
    <div  class="channel-pictures">
      <img  class="profile-picture"
       src="channel-pictures/channel-1.jpeg">
    </div>

    <div class="video-info">
      <p class="video-title">
      Talking Tech and AI with Google CEO
       Sundar Pichai!
    </p>
  
    <p class=""video-author>
      Marques Brownlee
    </p>

    <P class="video-stats">
      3.4M views  &#183; 6 months ago
    </P>
    </div>
    </div>
    </div>

    <div class="video-preview">
      <img class="thumbnails"
       src="thumbnails/thumbnail-2.webp">
    
    <p class="video-titile">
      Try Not To Laugh Challenge #9
    </p>
  
    <p class=""video-author>
    Markiplier
    </p>

    <P class="video-stats">
      19M views  &#183; 4 years ago
    </P>
    </div>

  </body>
</html>
